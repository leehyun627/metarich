<!DOCTYPE html>
<html lang="ko">
<head>

    <!-- SEO -->

    <!-- OG -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://leehyun627.github.io/metarich">
    <meta property="og:title" content="메타리치 | 보험설계사">
    <meta property="og:image" content="https://i.postimg.cc/0jJGBpML/peulopil.jpg">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; margin: 0; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const PhoneIcon = () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.72 19.72 0 0 1 3.08 4.18 2 2 0 0 1 5.06 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.62 2.63a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.45-1.14a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.62A2 2 0 0 1 22 16.92z"/>
    </svg>
);

const ChatIcon = () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
);

        <path d="M9 18l6-6-6-6"/>
    </svg>
);

const App = () => {
    const [tab, setTab] = useState('experience');

    return (

                <div className="mt-8 flex flex-col gap-3 items-center">
                    <a href="tel:01081435435" className="w-full max-w-[240px] bg-blue-600 py-4 rounded-full font-black flex justify-center gap-2">
                        <PhoneIcon /> 전화상담
                    </a>

                    <a href="https://open.kakao.com/o/s85ZJzmi" target="_blank" rel="noopener noreferrer"
                       className="w-full max-w-[240px] bg-yellow-400 text-black py-4 rounded-full font-black flex justify-center gap-2">
                        <ChatIcon /> 카카오 상담
                    </a>
                </div>
            </div>

            {/* 탭 */}
            <div className="flex justify-around mt-6 border-b text-sm font-bold">
                <button onClick={() => setTab('experience')} className={tab==='experience' ? "border-b-2 pb-2" : "text-gray-400 pb-2"}>경력</button>
                <button onClick={() => setTab('activity')} className={tab==='activity' ? "border-b-2 pb-2" : "text-gray-400 pb-2"}>활동</button>
                <button onClick={() => setTab('intro')} className={tab==='intro' ? "border-b-2 pb-2" : "text-gray-400 pb-2"}>소개</button>
            </div>

            {/* 내용 */}
            <div className="p-6 animate-fadeIn">

                {tab === 'experience' && (
                    <div className="space-y-3">
                        <div className="bg-gray-50 p-4 rounded-xl">메타리치 보험설계사</div>
                        <div className="bg-gray-50 p-4 rounded-xl">세이프가드 대표 설계사</div>
                    </div>
                )}

                {tab === 'activity' && (
                    <div className="space-y-3">

                            블로그 <ArrowIcon/>

                        <a href="https://www.instagram.com/m.a.p_lee_pro" target="_blank" rel="noopener noreferrer"
                           className="flex justify-between p-4 bg-white border rounded-xl">
                            인스타 <ArrowIcon/>

                    </div>
                )}

                {tab === 'intro' && (
                    <div className="bg-gray-50 p-5 rounded-xl text-sm leading-relaxed">
                        체계적인 보험점검을 통해 고객 맞춤형 솔루션을 제공합니다.
                    </div>
                )}

            </div>

            {/* 하단 */}
            <div className="fixed bottom-0 w-full max-w-md bg-white border-t text-center text-xs p-2">
                © 2026 Safeguard

        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
