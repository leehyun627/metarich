<div id="root"></div>
<script type="text/babel">

const PhoneIcon = () => (<svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.72 19.72 0 0 1 3.08 4.18 2 2 0 0 1 5.06 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.62 2.63a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.45-1.14a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.62A2 2 0 0 1 22 16.92z"/></svg>);

                    </div>
                )}
                {/* 자격/활동 탭은 기존과 동일하게 유지 */}
            </div>
            <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 border-t text-center text-[10px] p-3 shadow-md">
                <p className="text-gray-400">© 2026 Metarich. All Rights Reserved.</p>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
